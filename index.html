<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Juros Premium | SAC & Price</title>
    <meta name="description"
        content="Simule seu financiamento com as tabelas SAC e Price. Veja o detalhamento por parcela e descontos por antecipação.">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container animate-fade-in">
        <header>
            <h1>Calculadora Pro</h1>
            <p class="subtitle">Simulação Avançada de Financiamento e Antecipação</p>
        </header>

        <main class="calculator-grid">
            <!-- Inputs Section -->
            <section class="card">
                <div class="input-group">
                    <label for="assetValue">Valor do Bem</label>
                    <div class="input-wrapper">
                        <span>R$</span>
                        <input type="number" id="assetValue" placeholder="0,00" step="0.01" data-prefix="R$">
                    </div>
                </div>

                <div class="input-group">
                    <label for="interestRate">Taxa de Juros (% a.m.)</label>
                    <input type="number" id="interestRate" placeholder="0.00" step="0.01">
                </div>

                <div class="input-group">
                    <label for="installments">Número de Parcelas</label>
                    <input type="number" id="installments" placeholder="Ex: 12" step="1">
                </div>

                <div class="input-group">
                    <label for="system">Sistema de Amortização</label>
                    <select id="system">
                        <option value="price">Tabela Price (Parcelas Fixas)</option>
                        <option value="sac">SAC (Parcelas Decrescentes)</option>
                    </select>
                </div>

                <button id="calculateBtn" class="btn-calculate">Calcular Simulação</button>
            </section>

            <!-- Results Preview Section -->
            <section id="resultsSection" class="card hidden">
                <div class="simulation-details">
                    <div>
                        <span class="summary-label">Valor do Bem</span>
                        <span id="detailValue" class="detail-value">-</span>
                    </div>
                    <div>
                        <span class="summary-label">Taxa de Juros</span>
                        <span id="detailRate" class="detail-value">-</span>
                    </div>
                    <div>
                        <span class="summary-label">Parcelas</span>
                        <span id="detailInstallments" class="detail-value">-</span>
                    </div>
                </div>

                <div class="summary-cards">
                    <div class="summary-item">
                        <span class="summary-label">Total Financiado</span>
                        <span id="totalFinanced" class="summary-value">R$ 0,00</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Total de Juros</span>
                        <span id="totalInterest" class="summary-value">R$ 0,00</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Primeira Parcela</span>
                        <span id="firstInstallment" class="summary-value">R$ 0,00</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Última Parcela</span>
                        <span id="lastInstallment" class="summary-value">R$ 0,00</span>
                    </div>
                </div>

                <div class="results-table-container">
                    <h3>Detalhamento das Parcelas</h3>
                    <table id="installmentsTable">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Parcela</th>
                                <th>Amortização</th>
                                <th>Juros</th>
                                <th>Saldo Devedor</th>
                                <th>Desc. Antecip.</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Generated by JS -->
                        </tbody>
                    </table>
                    <div class="results-actions" style="margin-top: 2rem; display: flex; gap: 1rem;">
                        <button id="printBtn" class="btn-calculate" style="background: var(--success);">Imprimir
                            Simulação</button>
                    </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
